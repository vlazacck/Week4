<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Prediction App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Sales Prediction with LSTM Model</h1>
        <form method="POST" action="/predict">
            <label for="customers">Customers:</label>
            <input type="number" id="customers" name="customers" step="any" required>
            
            <label for="store_type">Store Type (Numeric):</label>
            <input type="number" id="store_type" name="store_type" step="any" required>
            
            <label for="competition_distance">Competition Distance:</label>
            <input type="number" id="competition_distance" name="competition_distance" step="any" required>
            
            <label for="promo">Promo (1 for Yes, 0 for No):</label>
            <input type="number" id="promo" name="promo" step="any" required>
            
            <button class="btn-grad" type="submit">Predict Sales</button>
        </form>
        
        {% if prediction_text %}
            <h3>{{ prediction_text }}</h3>
        {% endif %}
    </div>
</body>
</html>
